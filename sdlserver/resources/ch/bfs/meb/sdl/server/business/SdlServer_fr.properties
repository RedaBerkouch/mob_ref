application.title=SDL Statistique des élèves et étudiants

# Plausierrors
plausierror.WrongAhvNr=Plausi 1.4: le numéro AVS n'est pas correct. Son format et/ou sa parité sont erronés.
plausierror.WrongAge=Plausi 2.1: l''âge doit être compris entre {0} et {1} ans.
plausierror.NoClass=Plausi 3.2: Il n'existe pas de classe dans cette école.
plausierror.NoLearner=Plausi 3.3: Il n'existe pas d'élève dans cette classe.
plausierror.DuplicatePerson=Plausi 3.4a): La personne identifiée par {0} existe plusieurs fois dans cette classe.
plausierror.DuplicateClass=Plausi 3.4c): La classe identifiée par {0} existe plusieurs fois dans cette école.
plausierror.DuplicateSchool=Plausi 3.4d): L''école identifiée par {0} existe plusieurs fois dans cette livraison.
plausierror.DuplicateEducation=Plausi 3.4b): La personne identifiée par {0} poursuit plusieurs formations à plein-temps.
plausierror.WrongProfMatura=Plausi 3.5: L'enseignement MP1 n'est permis qu'au secondaire II.
plausierror.UnknownSchool=Plausi 3.1a): Ecole inconnue. Veuillez contrôler le No REE. Le type d'id de l'école doit être CH.BUR.
plausierror.NotAuthorizedUser=Plausi 3.1b): Livreur de données non autorisé.

