  {{- if and (.Values.global).secrets.externalStore.paths (.Values.global).secrets.externalStore.paths.udeploy }}
  ---
  # ExternalSecret: BitBucket Webhook
  apiVersion: external-secrets.io/v1
  kind: ExternalSecret
  metadata:
    annotations:
      {{- include "java-pipeline.annotations" . | nindent 4 }}
    name: {{ include "java-pipeline.resourceBaseName" . }}-{{ include "java-pipeline.pipelinePrefix" . }}-ex-udeploy-accesstoken
  spec:
    secretStoreRef:
      name: cop-{{ (.Values.global).secrets.externalStore.paths.udeploy.vault }}
      kind: ClusterSecretStore

    # Refresh: daily
    refreshInterval: 1440m0s

    target:
      name: {{ include "java-pipeline.resourceBaseName" . }}-{{ include "java-pipeline.pipelinePrefix" . }}-udeploy-accesstoken
      creationPolicy: Owner
      template:
        engineVersion: v2
        data:
          accesstoken: '{{ `{{ .accesstoken }}` }}'

    data:
      - secretKey: accesstoken
        remoteRef:
          key: {{ (.Values.global).secrets.paths.udeploy.id }}
          property: {{ (.Values.global).secrets.externalStore.paths.udeploy.property | default "accesstoken" }}
  {{- end }}
