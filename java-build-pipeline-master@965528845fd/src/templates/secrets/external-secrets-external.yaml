# ExternalSecret - external Vault instance
{{- if and (.Values.global).secrets (.Values.global).secrets.externalStore (.Values.global).secrets.externalStore.enabled }}
  {{- if and (.Values.global).secrets.externalStore.paths (.Values.global).secrets.externalStore.paths.bitbucket }}
---
# ExternalSecret: BitBucket
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  annotations:
    {{- include "java-pipeline.annotations" . | nindent 4 }}
  name: {{ include "java-pipeline.resourceBaseName" . }}-{{ include "java-pipeline.pipelinePrefix" . }}-ex-bitbucket-secret
spec:
  secretStoreRef:
    name: cop-{{ (.Values.global).secrets.externalStore.paths.bitbucket.vault }}
    kind: SecretStore

  # Refresh: daily
  refreshInterval: 1440m0s

  target:
    name: '{{ include "java-pipeline.resourceBaseName" . }}-{{ include "java-pipeline.pipelinePrefix" . }}-bitbucket-secret'
    creationPolicy: Owner
    template:
      engineVersion: v2
      # for Tekton
      type: kubernetes.io/ssh-auth
      metadata:
        annotations:
          # to be recognized from Tekton
          tekton.dev/git-0: bitbucket.bit.admin.ch
      data:
        # for Tekton
        ssh-privatekey: '{{ `{{ .gitkey }}` }}'
        id_rsa: |
          {{ `{{ .gitkey }}` }}
        known_hosts: bitbucket.bit.admin.ch ssh-rsa 

  data:
    - secretKey: gitkey
      remoteRef:
        key: {{ (.Values.global).secrets.externalStore.paths.bitbucket.id }}
        property: {{ (.Values.global).secrets.externalStore.paths.bitbucket.property | default "ssh" }}
  {{- end }}
  {{- if and (.Values.global).secrets.externalStore.paths (.Values.global).secrets.externalStore.paths.bitbucketAccessToken }}
---
