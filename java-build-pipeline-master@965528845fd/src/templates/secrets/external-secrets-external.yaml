spec:
  secretStoreRef:
    name: cop-{{ (.Values.global).secrets.externalStore.paths.bitbucketAccessToken.vault }}
    kind: SecretStore

  # Refresh: daily
  refreshInterval: 1440m0s

  target:
    name: '{{ include "java-pipeline.resourceBaseName" . }}-{{ include "java-pipeline.pipelinePrefix" . }}-bitbucket-accesstoken'
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        accesstoken: '{{ `{{ .accesstoken }}` }}'

  data:
    - secretKey: accesstoken
      remoteRef:
        key: {{ (.Values.global).secrets.externalStore.paths.bitbucketAccessToken.id }}
        property: {{ (.Values.global).secrets.externalStore.paths.bitbucketAccessToken.property | default "accesstoken" }}
  {{- end }}

