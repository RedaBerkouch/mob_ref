apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  labels:
    {{- include "java-pipeline.labels" . | nindent 4 }}
  annotations:
    {{- include "java-pipeline.annotations" . | nindent 4 }}
  name: {{ include "java-pipeline.resourceBaseName" $ }}-{{ include "java-pipeline.pipelinePrefix" . }}-checkout-branch
spec:
  description: This Task can be used to fetch all branches if ssh workspace is set and checkout a branch if the information is there. Both are necessary for some maven plugins used within the pipeline (git-commit-id-plugin and then pact)
  params:
    - name: build_directory
      description: Subdirectory in the workspace to run the build in
      type: string
      default: "."
    - name: git_commit
      description: the commit id
      type: string
    - name: git_branch
      description: the branch name
      default: ""
    - name: image
      description: the image to use for the checkout step
      default: ""
    - name: userHome
      description: Absolute path to the user's home directory
      type: string
      default: "/tmp"
  steps:
    - name: checkout
      image: $(params.image)
      env:
        - name: PARAM_BRANCH
          value: "$(params.git_branch)"
        - name: GIT_COMMIT
          value: "$(params.git_commit)"
        - name: PARAM_USER_HOME
          value: $(params.userHome)
        - name: WORKSPACE_SSH_DIRECTORY_BOUND
          value: $(workspaces.ssh-directory.bound)
        - name: WORKSPACE_SSH_DIRECTORY_PATH
          value: $(workspaces.ssh-directory.path)
        - name: HOME
          value: $(params.userHome)
      script: |
        #!/bin/bash
        set -e

        # Setup SSH following the same pattern as git-clone
        if [ "${WORKSPACE_SSH_DIRECTORY_BOUND}" = "true" ]; then
          cp -R "${WORKSPACE_SSH_DIRECTORY_PATH}" "${PARAM_USER_HOME}"/.ssh
          chmod 700 "${PARAM_USER_HOME}"/.ssh
          chmod -R 400 "${PARAM_USER_HOME}"/.ssh/*

          echo "Fetch all branches to create remote refs"
          git fetch origin "+refs/heads/*:refs/remotes/origin/*"
        else
          echo "Not fetching all branches because ssh workspace is not bound"
        fi

        if [ -n "${PARAM_BRANCH:-}" ] && [ "${PARAM_BRANCH}" != "none" ]; then
          git branch -f "${PARAM_BRANCH}" "${GIT_COMMIT}"
          git checkout "${PARAM_BRANCH}"
          echo "checked out ${PARAM_BRANCH}"
        else
          echo "PARAM_BRANCH is empty or 'none', GIT_BRANCH not checked out"
        fi
      resources: {{- include "pipeline.stepResources" (dict "name" "checkout" "nameSuffix" "checkout-branch" "Values" .Values "defaultProfile" "large") | nindent 8 }}
      securityContext:
        runAsNonRoot: true
        runAsGroup: 65532
        runAsUser: 65532
      workingDir: $(workspaces.ws.path)/$(params.build_directory)
      timeout: 30m0s
  workspaces:
    - name: ws
      description: The workspace containing the project
    - name: ssh-directory
      description: ssh directory with private key, known_hosts, config, etc.
      optional: true
