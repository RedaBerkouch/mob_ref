{{ $hasAzureDevopsRepo := eq (include "generic-application-pipeline.hasAzureDevopsRepo" .) "true" }}
{{ $hasBitbucketRepo := eq (include "generic-application-pipeline.hasBitbucketRepo" .) "true" }}

{{- if and (.Values.global).secrets (.Values.global).secrets.externalStore (.Values.global).secrets.externalStore.enabled (.Values.global).secrets.externalStore.paths }}
{{- if (.Values.global).secrets.externalStore.paths.bitbucket }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "generic-application-pipeline.releaseName" . }}-{{ (.Values.global).secrets.externalStore.paths.bitbucket.name }}-es
  labels:
    {{- include "generic-application-pipeline.metadata.template-labels" . | nindent 4 }}
  annotations:
    {{- include "generic-application-pipeline.metadata.template-annotations" . | nindent 4 }}
spec:
  secretStoreRef:
    name: cop-{{ required "global.secrets.externalStore.paths.bitbucket.vault is required" (.Values.global).secrets.externalStore.paths.bitbucket.vault }}
    kind: SecretStore

  refreshInterval: 5m0s

  target:
    name: {{ include "generic-application-pipeline.releaseName" . }}-{{ (.Values.global).secrets.externalStore.paths.bitbucket.property }}
    creationPolicy: Owner
    template:
      engineVersion: v2
      # for Tekton
      type: kubernetes.io/ssh-auth
      metadata:
        annotations:
          # to be recognized from Tekton, consider Bitbucket Campus and Azure too
          tekton.dev/git-0: bitbucket.bit.admin.ch
          tekton.dev/git-1: bitbucket-campus.bit.admin.ch
          tekton.dev/git-2: devops-server.admin.ch
      data:
        # for Tekton
        ssh-privatekey: '{{ `{{ .gitkey }}` }}'
        id_rsa: '{{ `{{ .gitkey }}` }}'
        known_hosts: |
          bitbucket.bit.admin.ch ssh-rsa 
          bitbucket-campus.bit.admin.ch ssh-rsa 
          devops-server.admin.ch,10.222.11.225 ssh-rsa 
  data:
    - secretKey: gitkey
      remoteRef:
        key: {{ required "global.secrets.externalStore.paths.bitbucket.id is required" (.Values.global).secrets.externalStore.paths.bitbucket.id }}
        property: {{ required "global.secrets.externalStore.paths.bitbucket.property is required" (.Values.global).secrets.externalStore.paths.bitbucket.property }}
{{ end }}

