kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: {{ include "generic-application-pipeline.routeName" . }}-el
  labels:
    {{- include "generic-application-pipeline.metadata.template-labels" . | nindent 4 }}
  annotations:
    {{- include "generic-application-pipeline.metadata.template-annotations" . | nindent 4 }}
spec:
  path: "/"
  port:
    targetPort: http-listener
  to:
    kind: Service
    # Service name is generated by event listener resource and prefixed with el-
    name: el-{{ include "generic-application-pipeline.releaseName" . }}
    weight: 100
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None