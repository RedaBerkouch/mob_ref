---
global:
  secrets:
    enabled: true
    externalStore:
      enabled: true
      vaults:
        - name: gap-no-argocd-presync-hook-delete-pvc-externalstore
          path: p-szb-ros-shrd-npr-01
          server: https://mav.bit.admin.ch
      paths:
        bitbucket:
          id: bit-amber-pipelines-d/default
          name: bitbucket-ssh-key
          property: bitbucket-ssh-key
          vault: gap-no-argocd-presync-hook-delete-pvc-externalstore
        bitbucketAccessToken:
          id: bit-amber-pipelines-d/default
          name: bitbucket-http-access-token
          property: bitbucket-http-access-token
          vault: gap-no-argocd-presync-hook-delete-pvc-externalstore
        nexus:
          id: bit-amber-pipelines-d/default
          name: dockerconfig
          property: dockerconfig
          vault: gap-no-argocd-presync-hook-delete-pvc-externalstore

generic-application-pipeline:
  applications:
    - appName: no-argocd-presync-hook-delete-pvc
      imageName: bit/no-argocd-presync-hook-delete-pvc
      srcRepo: ssh://git@bitbucket.bit.admin.ch/myproject/no-argocd-presync-hook-delete-pvc.git
      imageRegistry: image-registry.nexus.bit.admin.ch
      imageRegistryStaging: image-registry-incoming.nexus.bit.admin.ch
      containerFilePath: no-argocd-presync-hook-delete-pvc/Containerfile
  defaultArgoCDPreSyncHookDeletePVC: false