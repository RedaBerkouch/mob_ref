# Plausierrors
plausierror.Missing={0} est obligatoire.
plausierror.NotANumber={0} doit être numérique.
plausierror.NotADate={0} doit être une date.
plausierror.NotABoolean={0} doit être 0 ou 1.
plausierror.TooLong={0} ne doit pas dépasser {1} positions.
plausierror.WrongLength={0} doit comporter exactement {1} positions.
plausierror.CodeNotInCodegroup=Le code {1} n''appartient pas à la nomenclature {0}.
plausierror.WrongAge=L''âge doit être compris entre {0} et {1} ans.
plausierror.WrongContractDate=La date du contrat doit appartenir à l'année de relevé.
plausierror.WrongCancellationDate=La date de rupture du contrat doit appartenir à l'année de relevé.
plausierror.NoburNotComplete=Les données de l'entreprise formatrice sont incomplètes.
plausierror.NoEvent=Aucun événement n'est attribué à cette personne.
plausierror.DuplicatePerson=La personne identifiée par {0} existe déjà dans la livraison. Or l''identificateur doit être unique.
plausierror.DuplicateContract=Le contrat identifié par {0} existe déjà dans la livraison. Or l''identificateur doit être unique.
plausierror.MissingEventForContract=Le contrat identifié par {0} n'a pas un évènement correspondant (en cours, rupture ou examen).
plausierror.WrongEventForOngoingEducation=L''évènement en cours ne peut pas être accompagné par un examen ou une rupture pour le contrat {0}.
plausierror.MoreThanOneOngoingEducation=Il faut qu'il y ait au maximum un évènement en cours par personne.
plausierror.KeyAspectDoNotMatchSbfiCode=L'option spécifique ne correspond pas à la profession.
plausierror.WrongAhvNr=Le numéro AVS n'est pas correct.
plausierror.WrongIdType=Le type d'identificateur doit être 1 (NAVS13).
plausierror.ProfessionCode=La profession du contrat {0} ne correspond pas à celle de l''année précédente.

